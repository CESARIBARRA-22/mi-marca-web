<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocofest - Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .boton-rojo { background-color: red; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top:5px;}
    </style>
</head>
<body>

<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">
    <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<header>
    <h1>🍫Bienvenidos🍫</h1>
</header>

<section class="productos">
    <h2>Productos</h2>

    <div class="producto">
        <img src="imagenes/producto1.jpg" alt="Producto 1">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <a href="producto1.html"><button class="boton-rojo">Ver producto</button></a>
    </div>

    <div class="producto">
        <img src="imagenes/producto2.jpg" alt="Producto 2">
        <h3>Producto 2</h3>
        <p>$25.000</p>
        <a href="producto2.html"><button class="boton-rojo">Ver producto</button></a>
    </div>

    <div class="producto">
        <img src="imagenes/producto3.jpg" alt="Producto 3">
        <h3>Producto 3</h3>
        <p>$30.000</p>
        <a href="producto3.html"><button class="boton-rojo">Ver producto</button></a>
    </div>

    <div class="producto">
        <img src="imagenes/producto4.jpg" alt="Producto 4">
        <h3>Producto 4</h3>
        <p>$35.000</p>
        <a href="producto4.html"><button class="boton-rojo">Ver producto</button></a>
    </div>

</section>

<section class="carrito">
    <h2>Carrito</h2>
    <div class="carrito-container">
        <img src="imagenes/carrito.png" alt="Carrito">
        <ul id="listaCarrito"></ul>
    </div>
    <p>Total: $<span id="total">0</span></p>
    <button onclick="enviarPedido()" class="boton-rojo">Enviar pedido por WhatsApp</button>
</section>

<section class="contacto">
    <h2>Contacto</h2>
    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()" alt="WhatsApp">
        <img src="imagenes/correo.png" onclick="irCorreo()" alt="Correo">
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
