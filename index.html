<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocofest - Tienda Oficial</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .boton-rojo { 
            background-color: red; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            margin-top:5px;
            display:block;
        }

        .marca {
            position: absolute;
            left: 100px;
            top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 5px gold, 0 0 10px gold, 0 0 20px orange;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background: #111;
            list-style: none;
            padding: 10px;
            border-radius: 10px;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .carrito-icono { display: none; }

        .carrito-fijo {
            position: fixed;
            bottom: 80px;
            left: 20px;
        }

        .carrito-icono2 { width: 40px; }

        #contadorCarrito {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 12px;
        }

        .total-animado {
            font-weight: bold;
            transition: transform 0.3s;
        }

        .total-animado.animar { transform: scale(1.3); }

        .estrella {
            position: fixed;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
            z-index: 9999;
            animation: estrellaAnim 0.8s ease forwards;
        }

        @keyframes estrellaAnim {
            0% { transform: scale(1); opacity:1; }
            100% { transform: scale(0.2) translate(200px,-200px); opacity:0; }
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            text-align: center;
            margin: 20px 0;
            color: white;
            text-shadow: 0 0 10px gold;
        }

        /* 🔥 PANEL LATERAL */
        .panel-carrito {
            position: fixed;
            top: 0;
            right: -350px;
            width: 300px;
            height: 100%;
            background: #111;
            padding: 20px;
            transition: 0.4s;
            z-index: 2000;
        }

        .panel-carrito.activo {
            right: 0;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">
    <div class="marca">CHOCOFEST</div>

    <ul>
        <li><a href="#">Inicio</a></li>

        <li class="dropdown">
            <a href="#">Productos</a>
            <ul class="dropdown-menu">
                <li><a href="producto1.html">Producto 1</a></li>
                <li><a href="producto2.html">Producto 2</a></li>
                <li><a href="producto3.html">Producto 3</a></li>
                <li><a href="producto4.html">Producto 4</a></li>
            </ul>
        </li>

        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<header>
    <h1>🍫Bienvenidos🍫</h1>
</header>

<section class="productos">
    <h2>Productos</h2>

    <!-- PRODUCTO -->
    <div class="producto">
        <img src="imagenes/producto1.jpg">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <a href="producto1.html"><button class="boton-rojo">Ver producto</button></a>
        <button class="boton-rojo" onclick="agregarConAnimacion(this,'Producto 1',20000)">Añadir</button>
        <button class="boton-rojo" onclick="comprarDirecto('Producto 1',20000)">Comprar ahora</button>
    </div>

    <!-- COPIA PARA LOS DEMÁS PRODUCTOS IGUAL -->
</section>

<section class="carrito">
    <h2>Carrito</h2>

    <div class="carrito-fijo">
        <img src="imagenes/carrito.png" class="carrito-icono2" id="abrirCarrito">
        <span id="contadorCarrito">0</span>
    </div>

    <p>Total: $<span id="total" class="total-animado">0</span></p>

    <button onclick="enviarPedido()" class="boton-rojo">
        Enviar pedido por WhatsApp
    </button>
</section>

<!-- 🔥 PANEL -->
<div id="panelCarrito" class="panel-carrito">
    <h2>🛒 Tu carrito</h2>
    <ul id="listaCarrito"></ul>
</div>

<section class="contacto">
    <h2>Contacto</h2>

    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()">
        <img src="imagenes/correo.png" onclick="irCorreo()">
    </div>
</section>

<script>
let carrito = [];
let total = 0;

/* 🛒 ABRIR PANEL */
document.getElementById("abrirCarrito").onclick = () => {
    document.getElementById("panelCarrito").classList.toggle("activo");
};

/* ⭐ ANIMACIÓN */
function agregarConAnimacion(boton,nombre,precio){
    añadirAlCarrito(nombre,precio);
}

/* 🛒 AÑADIR */
function añadirAlCarrito(nombre,precio){
    carrito.push({nombre,precio,cantidad:1});
    actualizar();
}

/* 🔄 ACTUALIZAR */
function actualizar(){
    let lista = document.getElementById("listaCarrito");

    lista.innerHTML = carrito.map((p,i)=>`
        <li>
            ${p.nombre} x${p.cantidad}
            <button onclick="cambiar(${i},1)">+</button>
            <button onclick="cambiar(${i},-1)">-</button>
        </li>
    `).join("");

    total = carrito.reduce((a,p)=>a+p.precio*p.cantidad,0);
    document.getElementById("total").innerText = total;
    document.getElementById("contadorCarrito").innerText = carrito.length;
}

/* ➕➖ */
function cambiar(i,c){
    carrito[i].cantidad += c;
    if(carrito[i].cantidad<=0) carrito.splice(i,1);
    actualizar();
}

/* ⚡ COMPRA DIRECTA */
function comprarDirecto(nombre,precio){
    window.open(`https://wa.me/573128779750?text=Quiero comprar ${nombre}`);
}

/* 📲 CONTACTO */
function irWhatsApp(){
    window.open("https://wa.me/573128779750?text=Hola quiero info");
}

function irCorreo(){
    window.open("mailto:cesaribarragonzalez508@gmail.com?subject=Consulta&body=Hola quiero info");
}
</script>

<script src="script.js"></script>

</body>
</html>
