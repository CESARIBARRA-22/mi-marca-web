<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocofest - Tienda Oficial</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .boton-rojo { 
            background-color: red; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            margin-top:5px;
            display:block;
        }

        .marca {
            position: absolute;
            left: 120px; /* movido un poco a la derecha */
            top: 10px;   /* un poco más arriba */
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 5px gold, 0 0 10px gold, 0 0 20px orange;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background: #111;
            list-style: none;
            padding: 10px;
            border-radius: 10px;
            z-index: 100; /* para que siempre quede encima */
        }

        .dropdown-menu li a {
            color: white;
        }

        .dropdown-menu li a:hover {
            color: gold;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .carrito-icono {
            display: none;
        }

        .carrito-fijo {
            position: fixed;
            bottom: 80px;
            left: 20px;
            z-index: 1000;
        }

        .carrito-icono2 {
            width: 40px;
            transition: 0.3s;
        }

        .carrito-icono2:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px gold);
            cursor: pointer;
        }

        #contadorCarrito {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 12px;
        }

        .total-animado {
            font-weight: bold;
            font-size: 18px;
            text-align: right;
            display: block;
            margin-top: 20px; /* total más abajo del carrito */
            transition: transform 0.3s;
        }

        .total-animado.animar {
            transform: scale(1.3);
        }

        .estrella {
            position: fixed;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
            z-index: 9999;
            animation: estrellaAnim 0.8s ease forwards;
        }

        @keyframes estrellaAnim {
            0% { transform: scale(1) translate(0,0); opacity:1; }
            100% { transform: scale(0.2) translate(200px,-200px); opacity:0; }
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            text-align: center;
            margin: 20px 0;
            color: white;
            text-shadow: 0 0 10px gold;
        }

        /* Animación botones navbar */
        .navbar a {
            position: relative;
            padding: 10px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background: rgba(255,215,0,0.2);
            color: gold;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .marca {
                left: 80px;
                top: 5px;
            }

            .navbar ul li {
                margin: 0 5px;
            }
        }

    </style>
</head>

<body>

<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">

    <div class="marca">CHOCOFEST</div>

    <ul>
        <li><a href="#">Inicio</a></li>

        <li class="dropdown">
            <a href="#">Productos</a>
            <ul class="dropdown-menu">
                <li><a href="producto1.html">Producto 1</a></li>
                <li><a href="producto2.html">Producto 2</a></li>
                <li><a href="producto3.html">Producto 3</a></li>
                <li><a href="producto4.html">Producto 4</a></li>
            </ul>
        </li>

        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<header>
    <h1>🍫Bienvenidos🍫</h1>
</header>

<section class="productos">
    <h2>Productos</h2>

    <div class="producto">
        <img src="imagenes/producto1.jpg">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <a href="producto1.html"><button class="boton-rojo">Ver producto</button></a>
        <button class="boton-rojo" onclick="agregarConAnimacion(this, 'Producto 1', 20000)">Añadir al carrito</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto2.jpg">
        <h3>Producto 2</h3>
        <p>$25.000</p>
        <a href="producto2.html"><button class="boton-rojo">Ver producto</button></a>
        <button class="boton-rojo" onclick="agregarConAnimacion(this, 'Producto 2', 25000)">Añadir al carrito</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto3.jpg">
        <h3>Producto 3</h3>
        <p>$30.000</p>
        <a href="producto3.html"><button class="boton-rojo">Ver producto</button></a>
        <button class="boton-rojo" onclick="agregarConAnimacion(this, 'Producto 3', 30000)">Añadir al carrito</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto4.jpg">
        <h3>Producto 4</h3>
        <p>$35.000</p>
        <a href="producto4.html"><button class="boton-rojo">Ver producto</button></a>
        <button class="boton-rojo" onclick="agregarConAnimacion(this, 'Producto 4', 35000)">Añadir al carrito</button>
    </div>
</section>

<section class="carrito">
    <h2>Carrito</h2>

    <div class="carrito-container">
        <div class="carrito-fijo">
            <img src="imagenes/carrito.png" class="carrito-icono2">
            <span id="contadorCarrito">0</span>
        </div>

        <ul id="listaCarrito"></ul>

        <!-- Total movido fuera del carrito-fijo -->
        <p>Total: $<span id="total" class="total-animado">0</span></p>

        <button onclick="enviarPedido()" class="boton-rojo">
            Enviar pedido por WhatsApp
        </button>
    </div>
</section>

<section class="contacto">
    <h2>Contacto</h2>

    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()">
        <img src="imagenes/correo.png" onclick="irCorreo()">
    </div>
</section>

<script>
let carrito = [];
let total = 0;

function agregarConAnimacion(boton, nombre, precio) {
    let img = boton.parentElement.querySelector("img");
    let rect = img.getBoundingClientRect();

    let estrella = document.createElement("div");
    estrella.classList.add("estrella");
    estrella.style.left = rect.left + "px";
    estrella.style.top = rect.top + "px";
    document.body.appendChild(estrella);
    setTimeout(() => estrella.remove(), 800);

    añadirAlCarrito(nombre, precio);
}

function renderCarrito() {
    let lista = document.getElementById("listaCarrito");
    lista.innerHTML = carrito.map((item, index) => `
        <li>
            ${item.nombre} - $${item.precio}
            <button onclick="eliminarDelCarrito(${index})" class="boton-rojo">🗑️</button>
        </li>
    `).join("");

    document.getElementById("contadorCarrito").innerText = carrito.length;

    let totalSpan = document.getElementById("total");
    totalSpan.innerText = total;
    totalSpan.classList.add("animar");
    setTimeout(() => totalSpan.classList.remove("animar"), 300);
}

function añadirAlCarrito(nombre, precio) {
    carrito.push({nombre, precio});
    total += precio;
    renderCarrito();
}

function eliminarDelCarrito(index) {
    total -= carrito[index].precio;
    carrito.splice(index, 1);
    renderCarrito();
}

function enviarPedido() {
    let mensaje = "Hola quiero comprar:\n";
    carrito.forEach(p => mensaje += `${p.nombre} - $${p.precio}\n`);
    mensaje += `Total: $${total}`;
    window.open(`https://wa.me/573128779750?text=${encodeURIComponent(mensaje)}`);
}

function irWhatsApp() {
    let numero = "573128779750";
    let mensaje = "Hola, quiero más información sobre Chocofest 🍫";
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
}

function irCorreo() {
    let correo = "cesaribarragonzalez508@gmail.com";
    let asunto = "Información Chocofest";
    let cuerpo = "Hola, quiero más información sobre sus productos.";
    window.open(`mailto:${correo}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`);
}

function vaciarCarrito() {
    carrito = [];
    total = 0;
    renderCarrito();
}
</script>

</body>
</html>
