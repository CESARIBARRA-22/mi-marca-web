<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocofest - Tienda Oficial</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .boton-rojo { 
            background-color: red; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            margin-top:5px;
            display:block;
        }

        .marca {
            position: absolute;
            left: 100px;
            top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 5px gold, 0 0 10px gold, 0 0 20px orange;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background: #111;
            list-style: none;
            padding: 10px;
            border-radius: 10px;
        }

        .dropdown-menu li a {
            color: white;
        }

        .dropdown-menu li a:hover {
            color: gold;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .carrito-icono {
            display: none;
        }

        .carrito-fijo {
            position: fixed;
            bottom: 80px;
            left: 20px;
        }

        .carrito-icono2 {
            width: 40px;
        }

        #contadorCarrito {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 12px;
        }

        .total-animado {
            font-weight: bold;
            transition: transform 0.3s;
        }

        .total-animado.animar {
            transform: scale(1.3);
        }

        .estrella {
            position: fixed;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
            z-index: 9999;
            animation: estrellaAnim 0.8s ease forwards;
        }

        @keyframes estrellaAnim {
            0% { transform: scale(1) translate(0,0); opacity:1; }
            100% { transform: scale(0.2) translate(200px,-200px); opacity:0; }
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            text-align: center;
            margin: 20px 0;
            color: white;
            text-shadow: 0 0 10px gold;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">
    <div class="marca">CHOCOFEST</div>

    <ul>
        <li><a href="#">Inicio</a></li>

        <li class="dropdown">
            <a href="#">Productos</a>
            <ul class="dropdown-menu">
                <li><a href="producto1.html">Producto 1</a></li>
                <li><a href="producto2.html">Producto 2</a></li>
                <li><a href="producto3.html">Producto 3</a></li>
                <li><a href="producto4.html">Producto 4</a></li>
            </ul>
        </li>

        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<header>
    <h1>🍫Bienvenidos🍫</h1>
</header>

<section class="productos">
    <h2>Productos</h2>

    <div class="producto">
        <img src="imagenes/producto1.jpg">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <button class="boton-rojo" onclick="agregarConAnimacion(this, 'Producto 1', 20000)">Añadir</button>
    </div>
</section>

<section class="contacto">
    <h2>Contacto</h2>
    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()">
        <img src="imagenes/correo.png" onclick="irCorreo()">
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
