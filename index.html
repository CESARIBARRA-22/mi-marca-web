<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Marca - Cesar</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">

    <ul>
        <li><a href="#" onclick="mostrarSeccion('inicio')">Inicio</a></li>
        <li><a href="#" onclick="mostrarSeccion('menuProductos')">Productos</a></li>
        <li><a href="#" onclick="mostrarSeccion('contacto')">Contacto</a></li>
    </ul>
</nav>

<!-- INICIO -->
<div id="inicio">

<header>
    <h1>Bienvenidos 🦾</h1>
</header>

<section class="registro">
    <h2>Registro</h2>
    <form id="formRegistro">
        <input type="text" placeholder="Nombre" required>
        <input type="text" placeholder="Cédula" required>
        <input type="text" placeholder="Departamento">
        <input type="text" placeholder="Municipio">
        <input type="text" placeholder="Dirección">
        <button type="submit">Registrarse</button>
    </form>

    <div id="resultado"></div>
</section>

</div>

<!-- MENU PRODUCTOS -->
<div id="menuProductos" style="display:none;">
    <h2>Categorías</h2>

    <button onclick="mostrarSeccion('chocolate')">Barras de chocolate</button>
    <button onclick="mostrarSeccion('manteca')">Manteca de cacao</button>
    <button onclick="mostrarSeccion('chocolatinas')">Chocolatinas</button>
    <button onclick="mostrarSeccion('mantequilla')">Mantequilla de cacao</button>
</div>

<!-- PRODUCTOS (LOS QUE YA TENÍAS) -->
<div id="chocolate" style="display:none;">
<section class="productos">
    <h2>Productos</h2>

    <div class="producto">
        <img src="imagenes/producto1.jpg">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <button onclick="comprarWhatsApp('Producto 1','imagenes/producto1.jpg')">Comprar</button>
    </div>
</section>
</div>

<!-- CONTACTO -->
<div id="contacto" style="display:none;">
<section class="contacto">
    <h2>Contacto</h2>

    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()">
        <img src="imagenes/correo.png" onclick="irCorreo()">
    </div>
</section>
</div>

<script src="script.js"></script>

</body>
</html>
<script src="script.js"></script>

</body>
</html>
