<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Marca - Cesar</title>

    <!-- FUENTE PRO -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR PROFESIONAL -->
<nav class="navbar">
    <img src="imagenes/logo.png" width="80" alt="Logo">

    <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
        <li><a href="#">Contacto</a></li>
    </ul>
</nav>

<header>
    <h1>Bienvenidos 🦾</h1>
</header>

<section class="registro">
    <h2>Registro</h2>
    <form id="formRegistro">
        <input type="text" placeholder="Nombre" required>
        <input type="text" placeholder="Cédula" required>
        <input type="text" placeholder="Departamento">
        <input type="text" placeholder="Municipio">
        <input type="text" placeholder="Dirección">
        <button type="submit">Registrarse</button>
    </form>

    <div id="resultado"></div>
</section>

<section class="productos">
    <h2>Productos</h2>

    <div class="producto">
        <img src="imagenes/producto1.jpg" alt="Producto 1">
        <h3>Producto 1</h3>
        <p>$20.000</p>
        <button onclick="comprarWhatsApp('Producto 1', 'imagenes/producto1.jpg')">Comprar</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto2.jpg" alt="Producto 2">
        <h3>Producto 2</h3>
        <p>$25.000</p>
        <button onclick="comprarWhatsApp('Producto 2', 'imagenes/producto2.jpg')">Comprar</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto3.jpg" alt="Producto 3">
        <h3>Producto 3</h3>
        <p>$30.000</p>
        <button onclick="comprarWhatsApp('Producto 3', 'imagenes/producto3.jpg')">Comprar</button>
    </div>

    <div class="producto">
        <img src="imagenes/producto4.jpg" alt="Producto 4">
        <h3>Producto 4</h3>
        <p>$35.000</p>
        <button onclick="comprarWhatsApp('Producto 4', 'imagenes/producto4.jpg')">Comprar</button>
    </div>

</section>
    
<section class="carrito">
    <h2>Carrito</h2>
    <ul id="listaCarrito"></ul>
    <p>Total: $<span id="total">0</span></p>

    <button onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</section>

<section class="contacto">
    <h2>Contacto</h2>

    <div class="iconos">
        <img src="imagenes/whatsapp.png" onclick="irWhatsApp()" alt="WhatsApp">
        <img src="imagenes/correo.png" onclick="irCorreo()" alt="Correo">
    </div>
</section>>

<script src="script.js"></script>

</body>
</html>
